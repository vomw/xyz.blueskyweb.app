name: Build Signed APK (No Expo Cloud)

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: true
        default: 'main'
      version_code:
        description: 'Android Version Code (integer)'
        required: false
        default: ''

jobs:
  build:
    name: Build Signed Android APK
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: 🔧 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: ⚙️ Install dependencies
        run: yarn install --frozen-lockfile

      - name: 🔤 Compile translations
        run: yarn intl:build

      - name: 🛠️ Create dummy google-services.json
        run: |
          if [ ! -f google-services.json ]; then
            echo '{"project_info":{"project_number":"0","project_id":"dummy","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"xyz.blueskyweb.app"}},"api_key":[{"current_key":"dummy"}],"services":{"appinvite_service":{"status":1,"other_platform_id":[]}}}]}' > google-services.json
          fi

      - name: 🏗️ Generate Android Project
        run: npx expo prebuild --platform android --non-interactive
        env:
          BSKY_ANDROID_VERSION_CODE: ${{ github.event.inputs.version_code || github.run_number }}
          BSKY_IOS_BUILD_NUMBER: ${{ github.run_number }}

      - name: 🔨 Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          BSKY_ANDROID_VERSION_CODE: ${{ github.event.inputs.version_code || github.run_number }}

      - name: ✍️ Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: 🚀 Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bluesky-signed-apk
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          retention-days: 1

      - name: 🚀 Upload Unsigned APK (Backup)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bluesky-unsigned-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
